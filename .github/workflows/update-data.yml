name: Update BTC Indicator Data

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 运行
    - cron: '0 0 * * *'
    # 每天 UTC 12:00 (北京时间 20:00) 运行，一天两次
    - cron: '0 12 * * *'
  workflow_dispatch: # 允许手动触发
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/update-data.yml'
      - 'update_data.py'
      - 'requirements.txt'

# Concurrency: ensure only one workflow runs at a time
# This prevents rate limit exhaustion from parallel runs
concurrency:
  group: btc-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Update BTC indicator data
      run: python update_data.py
      timeout-minutes: 5

    - name: Summarize failure
      if: failure()
      run: |
        echo "## BTC data update failed" >> $GITHUB_STEP_SUMMARY
        echo "- Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "- The workflow stopped before publishing new snapshot files." >> $GITHUB_STEP_SUMMARY
        echo "- Most likely cause: upstream API unavailable or returning 429 rate-limit responses." >> $GITHUB_STEP_SUMMARY
        echo "- Check the 'Update BTC indicator data' step logs for the failing endpoint." >> $GITHUB_STEP_SUMMARY
    
    - name: Check if data changed
      id: check_changes
      run: |
        git add -A
        if git diff --cached --quiet; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "✓ 数据未变化，无需提交"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "✓ 数据已更新"
        fi
    
    - name: Commit and push changes
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git commit -m "📊 Update BTC indicator data - $(date +'%Y-%m-%d %H:%M:%S UTC')"
        git push
    
    - name: Upload artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: btc-indicators-data
        path: |
          btc_indicators_history.json
          btc_indicators_latest.json
        retention-days: 30
