name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate checked-in data quality
        run: |
          python validate_btc_data_quality.py \
            --current-history app/public/btc_indicators_history.json \
            --current-latest app/public/btc_indicators_latest.json \
            --lookback-rows 30 \
            --max-row-drop 5 \
            --max-indicator-lag-days 21

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Lint
        working-directory: ./app
        run: npm run lint

      - name: Run frontend tests
        working-directory: ./app
        run: npm run test

      - name: Build
        working-directory: ./app
        run: npm run build
